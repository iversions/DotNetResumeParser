services:
  api:
    build: .
    ports:
      - "80:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=MaritimeResumeDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - AzureOpenAi__Endpoint=${AZURE_OPENAI_ENDPOINT}
      - AzureOpenAi__ApiKey=${AZURE_OPENAI_API_KEY}
      - AzureOpenAi__DeploymentName=${AZURE_OPENAI_DEPLOYMENT_NAME}
    depends_on:
      - db
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
